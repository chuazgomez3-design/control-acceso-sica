<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SICA - Reportes de Acceso</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script defer src="../assets/js/auth.js"></script>
  <script defer src="../assets/js/api.js"></script>
  <script defer src="../assets/js/script.js"></script>
  <script defer src="../assets/js/reportes.js"></script>
  <script defer src="../assets/js/logout.js"></script>
</head>
<body>
  <script>requireAuth();</script>
  <div class="container">
    <aside class="sidebar">
      <h2 class="logo">SICA</h2>
      <nav>
        <a href="index.html">Accesos</a>
        <a href="empleados.html">Empleados</a>
        <a href="nuevo_empleado.html">Nuevo Empleado</a>
        <a href="#" class="active">Reportes de Acceso</a>
        <a href="acceso_facial.html">Acceso Facial</a>
      </nav>
      <button class="logout">Cerrar sesión</button>
    </aside>

    <main class="main">
      <header class="header">
        <button id="toggleTheme">🌙</button>
        <h1>Reportes de Acceso</h1>
        <div class="datetime">
          <div class="date" id="currentDate"></div>
          <div class="time" id="currentTime"></div>
        </div>
      </header>
      <section class="content">
        <form id="reportForm" class="report-form">
          <div class="form-group">
            <label for="employeeId">ID del Empleado (opcional):</label>
            <input type="text" id="employeeId" name="employeeId" placeholder="Ej: 3">
          </div>
          <div class="form-group">
            <label for="startDate">Fecha Inicio:</label>
            <input type="date" id="startDate" name="startDate" required>
          </div>
          <div class="form-group">
            <label for="endDate">Fecha Fin:</label>
            <input type="date" id="endDate" name="endDate" required>
          </div>
          <button type="submit" class="btn">Generar Reporte</button>
        </form>
        <div id="reportResults" class="report-results"></div>
      </section>
    </main>
  </div>
</body>
</html>
