<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script defer src="../assets/js/api.js"></script>
  <script defer src="../assets/js/login.js"></script>
</head>
<body>
  <div class="container" style="justify-content:center; align-items:center; flex-direction:column; gap:30px;">
    <div class="header" style="width:100%; max-width:400px; justify-content:space-between;">
      <div class="datetime">
        <span id="currentDate"></span>
        <span id="currentTime"></span>
      </div>
      <button id="toggleTheme">🌙</button>
    </div>

    <div class="modern-form" style="max-width:400px; width:100%; text-align:center;">
      <h2 style="color:#4c1d95; font-weight:700;">Administrador SICA</h2>

      <form id="loginForm" class="form-inputs" style="flex-direction:column; align-items:center; gap:20px; width:100%;">
        <div class="form-group" style="width:100%; max-width:320px; text-align:left;">
          <label for="correo">Correo</label>
          <input type="text" id="correo" name="correo" placeholder="Ingresa tu Correo" required>
        </div>

        <div class="form-group" style="width:100%; max-width:320px; text-align:left;">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <div style="width:100%; display:flex; justify-content:center;">
          <button type="submit" class="save-btn" style="width:60%;">Acceder</button>
        </div>
      </form>
      <p id="loginError" style="margin-top:8px;color:#c0392b;font-weight:600;"></p>
      <p style="margin-top:15px; font-size:14px; color:#555;">
        Unicamente puede iniciar sesion el Administrador
      </p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggleTheme = document.getElementById("toggleTheme");
      const currentDate = document.getElementById("currentDate");
      const currentTime = document.getElementById("currentTime");
      toggleTheme.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        toggleTheme.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
      });
      function updateDateTime() {
        const now = new Date();
        currentDate.textContent = now.toLocaleDateString("es-MX");
        currentTime.textContent = now.toLocaleTimeString("es-MX");
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);
    });
  </script>
</body>
</html>
